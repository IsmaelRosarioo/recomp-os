function MacroWheel({protein,fat,carbs}){const total=protein*4+fat*9+carbs*4,pP=total?(protein*4/total)*100:0,pF=total?(fat*9/total)*100:0,pC=total?(carbs*4/total)*100:0,r=15.9,circ=2*Math.PI*r,segs=[{pct:pP,color:C.accent,off:0},{pct:pF,color:C.accent2,off:pP},{pct:pC,color:C.accent3,off:pP+pF}];return <div style={{display:'flex',gap:20,alignItems:'center',flexWrap:'wrap'}}><div style={{position:'relative',width:110,height:110,flexShrink:0}}><svg viewBox="0 0 36 36" style={{transform:'rotate(-90deg)',width:110,height:110}}>{segs.map((s,i)=><circle key={i} cx="18" cy="18" r={r} fill="none" stroke={s.color} strokeWidth="3.5" strokeDasharray={`${(s.pct/100)*circ} ${circ}`} strokeDashoffset={`-${(s.off/100)*circ}`} strokeLinecap="round"/>)}</svg><div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}><div style={{fontSize:16,fontFamily:"'Space Mono',monospace",color:C.text,fontWeight:900}}>{Math.round(total)}</div><div style={{fontSize:9,color:C.textDim,letterSpacing:1}}>KCAL</div></div></div><div style={{flex:1,minWidth:160}}>{[{label:'Protein',g:protein,pct:pP,color:C.accent},{label:'Fat',g:fat,pct:pF,color:C.accent2},{label:'Carbs',g:carbs,pct:pC,color:C.accent3}].map(m=><div key={m.label} style={{display:'flex',alignItems:'center',gap:8,marginBottom:9}}><div style={{width:9,height:9,borderRadius:'50%',background:m.color,flexShrink:0}}/><span style={{fontSize:12,color:C.textDim,width:52}}>{m.label}</span><span style={{fontFamily:"'Space Mono',monospace",fontSize:13,color:m.color,fontWeight:700,width:44}}>{m.g}g</span><div style={{flex:1,height:4,background:C.border,borderRadius:2}}><div style={{height:'100%',width:`${m.pct}%`,background:m.color,borderRadius:2}}/></div><span style={{fontSize:10,color:C.textDim,width:28}}>{Math.round(m.pct)}%</span></div>)}</div></div>}
function CkItem({text,priority='normal',checked,onToggle,sub}){const pc=priority==='high'?C.danger:priority==='med'?C.gold:C.textDim;return <div onClick={onToggle} style={{display:'flex',alignItems:'flex-start',gap:12,cursor:onToggle?'pointer':'default',padding:'8px 0',borderBottom:`1px solid ${C.border}22`,opacity:checked?.45:1,transition:'opacity .2s'}}><div style={{width:18,height:18,borderRadius:4,flexShrink:0,marginTop:1,border:`2px solid ${checked?C.success:pc}`,background:checked?C.success:'transparent',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s'}}>{checked&&<span style={{fontSize:10,color:'#000',fontWeight:900}}>✓</span>}</div><div><span style={{fontSize:13,color:checked?C.muted:C.text,textDecoration:checked?'line-through':'none',lineHeight:1.5}}>{text}</span>{sub&&<div style={{fontSize:11,color:C.textDim,marginTop:2}}>{sub}</div>}</div></div>}

NestedToggle(['injections','hcg'],!today.injections.hcg)}/>{isAriDay&&<CkItem text="Arimidex 0.5 mg (M/W/F)" priority="med" checked={today.injections.arimidex} onToggle={()=>handleNestedToggle(['injections','arimidex'],!today.injections.arimidex)}/>}</>}{phase==='PCT'&&<><CkItem text="Enclomiphene (AM dose)" priority="high" checked={today.injections.enclomiphene} onToggle={()=>handleNestedToggle(['injections','enclomiphene'],!today.injections.enclomiphene)}/><div style={{fontSize:11,color:C.textDim,marginTop:8,lineHeight:1.5}}>Typical PCT: 25 mg daily for 2 weeks, then 12.5 mg daily for 2 weeks. Avoid Arimidex unless absolutely necessary.</div></>}{phase==='NO PROTOCOL'&&<div style={{fontSize:12,color:C.textDim}}>Set your protocol in the Protocol tab to enable phase-specific tracking.</div>}</Card><Card color={C.border}><div style={{fontSize:11,color:C.accent3,letterSpacing:2,marginBottom:10,textTransform:'uppercase'}}>Meals & Training</div><CkItem text="Meal 1 — 8:45 PM eggs + whites" priority="high" checked={today.meals.meal1} onToggle={()=>handleNestedToggle(['meals','meal1'],!today.meals.meal1)}/><CkItem text="Meal 2 — 1:30 AM chicken + rice" priority="high" checked={today.meals.meal2} onToggle={()=>handleNestedToggle(['meals','meal2'],!today.meals.meal2)}/><CkItem text="Meal 3 — 6:00 AM pre-workout shake" priority="high" checked={today.meals.meal3} onToggle={()=>handleNestedToggle(['meals','meal3'],!today.meals.meal3)}/><CkItem text="Meal 4 — 9:15 AM post-workout chicken + rice" priority="high" checked={today.meals.meal4} onToggle={()=>handleNestedToggle(['meals','meal4'],!today.meals.meal4)}/><CkItem text="Gym session (7:30 AM split)" priority="high" checked={today.training.gymDone} onToggle={()=>updateToday({training:{...(today.training||{}),gymDone:!today.training.gymDone}})}/></Card></div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:16}}><Card color={C.border}><div style={{fontSize:11,color:C.accent2,letterSpacing:2,marginBottom:10,textTransform:'uppercase'}}>Supplements</div><CkItem text="Creatine" priority="med" checked={today.supplements.creatine} onToggle={()=>handleNestedToggle(['supplements','creatine'],!today.supplements.creatine)}/><CkItem text="Electrolytes" priority="med" checked={today.supplements.electrolytes} onToggle={()=>handleNestedToggle(['supplements','electrolytes'],!today.supplements.electrolytes)}/><CkItem text="Fish oil" priority="med" checked={today.supplements.fishOil} onToggle={()=>handleNestedToggle(['supplements','fishOil'],!today.supplements.fishOil)}/><CkItem text="Magnesium" priority="med" checked={today.supplements.magnesium} onToggle={()=>handleNestedToggle(['supplements','magnesium'],!today.supplements.magnesium)}/></Card><Card color={C.border}><div style={{fontSize:11,color:C.purple,letterSpacing:2,marginBottom:10,textTransform:'uppercase'}}>Skin & Recovery</div><CkItem text="AM skin routine" priority="med" checked={today.skin.amRoutine} onToggle={()=>handleNestedToggle(['skin','amRoutine'],!today.skin.amRoutine)}/><CkItem text="PM skin routine" priority="med" checked={today.skin.pmRoutine} onToggle={()=>handleNestedToggle(['skin','pmRoutine'],!today.skin.pmRoutine)}/><CkItem text="Sleep 7–9 hours" priority="high" checked={today.sleepHours>=7} onToggle={()=>{}}/></Card></div><Card color={C.border}><div style={{fontSize:11,color:C.accent,letterSpacing:2,marginBottom:8,textTransform:'uppercase'}}>Notes / Symptoms</div><textarea value={today.notes} onChange={e=>updateToday({notes:e.target.value})} rows={4} style={{width:'100%',padding:'10px 12px',borderRadius:10,border:`1px solid ${C.border}`,background:'#05080C',color:C.text,fontSize:13,resize:'vertical'}} placeholder="Log blood pressure, mood, libido, pump quality, joint pain, etc."/></Card></div>}
function ProtocolView({protocol,setProtocol}){const timeline=getTimeline(protocol);return <div style={{animation:'fadeUp .4s ease'}}><div style={{marginBottom:18}}><h2 style={{fontFamily:"'Space Mono',monospace",fontSize:18,color:C.text,marginBottom:4}}>Protocol Timeline</h2><p style={{fontSize:13,color:C.textDim}}>Set your cycle start, length, and PCT window so the OS can mark cycle vs PCT days.</p></div><Card color={C.border} style={{marginBottom:16}}><div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(180px,1fr))',gap:16}}><div><div style={{fontSize:11,color:C.accent,letterSpacing:2,marginBottom:6,textTransform:'uppercase'}}>Cycle Start</div><input type="date" value={protocol.cycleStart} onChange={e=>setProtocol({...protocol,cycleStart:e.target.value})} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:`1px solid ${C.border}`,background:'#05080C',color:C.text,fontSize:13}}/></div><div><div style={{fontSize:11,color:C.accent,letterSpacing:2,marginBottom:6,textTransform:'uppercase'}}>Cycle Length (weeks)</div><input type="number" min="4" max="24" value={protocol.cycleLengthWeeks} onChange={e=>setProtocol({...protocol,cycleLengthWeeks:+e.target.value||0})} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:`1px solid ${C.border}`,background:'#05080C',color:C.text,fontSize:13}}/></div><div><div style={{fontSize:11,color:C.accent2,letterSpacing:2,marginBottom:6,textTransform:'uppercase'}}>PCT Delay (days)</div><input type="number" min="14" max="21" value={protocol.pctDelayDays} onChange={e=>setProtocol({...protocol,pctDelayDays:+e.target.value||0})} style={{width:'100%',padding:'8px 10px',borderRadius:8,border:`1px solid ${C.border}`,background:'#05080C',color:C.text,fontSize:13}}/><div style={{fontSize:11,color:C.textDim,marginTop:4}}>14–21 days after last Test E injection.</div></div><div><div style={{fontSize:11,color:C.accent3,letterSpacing:2,marginBottom:6,textTransform:'uppercase'}}>PCT Length (weeks)</div><input type="
