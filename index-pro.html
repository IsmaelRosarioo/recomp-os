<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Recomp OS PRO v2.0 — Ismael Physique Operating System</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0e27;
      color: #e0e6ed;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 30px;
      padding: 20px;
      background: linear-gradient(135deg, #1a1f3a 0%, #2d1b3d 100%);
      border-radius: 12px;
      border: 1px solid #2a3f5f;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 20px;
    }
    .title { font-size: 24px; font-weight: 600; }
    .version {
      background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
      color: #fff;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(0, 255, 0, 0.1);
      border: 1px solid #00ff00;
      border-radius: 20px;
      font-size: 13px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      background: #00ff00;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    .nav-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      padding: 8px;
      background: #1a1f3a;
      border-radius: 12px;
      overflow-x: auto;
      flex-wrap: wrap;
    }
    .tab {
      padding: 12px 20px;
      background: transparent;
      border: none;
      color: #8b95a5;
      cursor: pointer;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .tab:hover { background: rgba(0, 212, 255, 0.1); color: #00d4ff; }
    .tab.active {
      background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
      color: #fff;
      font-weight: 600;
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-bottom: 24px; }
    .card {
      background: linear-gradient(135deg, #1a1f3a 0%, #2a2f4a 100%);
      border-radius: 12px;
      padding: 24px;
      border: 1px solid #2a3f5f;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #00d4ff;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .metric-value {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .metric-label {
      font-size: 12px;
      color: #8b95a5;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-blue { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }
    .badge-green { background: rgba(0, 255, 0, 0.2); color: #00ff00; }
    .badge-yellow { background: rgba(255, 200, 0, 0.2); color: #ffc800; }
    .checkbox-list { display: flex; flex-direction: column; gap: 12px; }
    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(0, 212, 255, 0.05);
      border-radius: 8px;
      border: 1px solid transparent;
      transition: all 0.3s;
    }
    .checkbox-item:hover { border-color: #00d4ff; }
    .checkbox-item.completed {
      background: rgba(0, 255, 0, 0.1);
      border-color: #00ff00;
    }
    .checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #00d4ff;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .checkbox.checked {
      background: #00ff00;
      border-color: #00ff00;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #2a3f5f;
      border-radius: 8px;
      color: #e0e6ed;
      font-size: 14px;
      font-family: inherit;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #00d4ff;
    }
    textarea { resize: vertical; min-height: 100px; }
    .btn {
      padding: 12px 24px;
      background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
      border: none;
      border-radius: 8px;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0, 212, 255, 0.3); }
    .btn-secondary {
      background: rgba(139, 149, 165, 0.2);
      color: #8b95a5;
    }
    .btn-secondary:hover {
      background: rgba(139, 149, 165, 0.3);
      box-shadow: none;
    }
    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }
    .photo-placeholder {
      aspect-ratio: 1;
      background: rgba(0, 212, 255, 0.1);
      border: 2px dashed #00d4ff;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .photo-placeholder:hover { background: rgba(0, 212, 255, 0.2); }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }
    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 212, 255, 0.05);
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .calendar-day:hover { background: rgba(0, 212, 255, 0.15); }
    .calendar-day.active {
      background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
      color: #fff;
      font-weight: 600;
    }
    .lab-result {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 8px;
      margin-bottom: 8px;
    }
    .lab-name { font-weight: 500; }
    .lab-value { color: #00d4ff; font-weight: 600; }
    .progress-bar {
      width: 100%;
      height: 8px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 4px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4ff 0%, #00ff00 100%);
      border-radius: 4px;
      transition: width 0.3s;
    }
    @media (max-width: 768px) {
      .grid { grid-template-columns: 1fr; }
      .header { flex-direction: column; gap: 16px; }
      .nav-tabs { flex-wrap: nowrap; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [activeTab, setActiveTab] = useState('today');
      const [data, setData] = useState({
        weight: 193,
        sleep: 8,
        steps: 20000,
        water: 4,
        recompDay: '2026-06-29',
        phase: 'CYCLE',
        compliance: 44,
        injections: [
          { name: 'Test E (Mon/Thu)', dose: '150mg x2/week Mon+Thu (300mg/week)', completed: true },
          { name: 'Primobolone (Mon/Thu)', dose: '150mg x2/week Mon+Thu (300mg/week)', completed: true },
          { name: 'Glow Stack (Daily)', dose: '20 IU', completed: true },
          { name: 'hCG (3x/week)', dose: '500 IU', completed: true },
          { name: 'Arimidex (As needed)', dose: '0.5mg', completed: true },
        ],
        meals: [
          { name: 'Meal 1', time: '8:45 PM', food: 'mgrs + whites', completed: false },
          { name: 'Meal 2', time: '1:30 AM', food: 'chicken + rice', completed: false },
          { name: 'Meal 3', time: '6:00 AM', food: 'pre-workout shake', completed: false },
          { name: 'Meal 4', time: '9:15 AM', food: 'post-workout chicken + rice', completed: false },
          { name: 'Gym session', time: '7:30 AM split', completed: false },
        ],
        supplements: [
          { name: 'Creatine', completed: false },
          { name: 'Electrolytes', completed: false },
          { name: 'Fish oil', completed: false },
          { name: 'Magnesium', completed: false },
        ],
        hairProtocol: [
          { name: 'Dutasteride (Daily)', dose: '0.85-1mg (6-7mg/week)', completed: false },
          { name: 'Minoxidil (Daily)', dose: '5-6mg oral', completed: false },
        ],
        skinRoutine: [
          { name: 'AM skin routine', completed: false },
          { name: 'PM skin routine', completed: false },
          { name: 'Sauna w/shower', completed: true },
        ],
        labs: [
          { name: 'Testosterone Total', value: '1250 ng/dL', date: '2026-06-15', range: '264-916' },
          { name: 'Estradiol (E2)', value: '45 pg/mL', date: '2026-06-15', range: '10-40' },
          { name: 'Free T', value: '285 pg/mL', date: '2026-06-15', range: '52-280' },
          { name: 'DHT', value: '95 ng/dL', date: '2026-06-15', range: '30-85' },
          { name: 'SHBG', value: '18 nmol/L', date: '2026-06-15', range: '10-57' },
        ],
        notes: 'Log blood pressure, mood, libido, pump quality, joint pain, etc.',
        protocolEditing: false,
        cycleStart: '2025-06-08',
        weeklyTestE: 300,
        weeklyPrimo: 200,
        hcgWeekly: '3x per week (500 IU each)',
        hcgDose: 500,
        dailyTestE: 300 / 7,
      });

      useEffect(() => {
        const saved = localStorage.getItem('recompOSProData');
        if (saved) { const parsed = JSON.parse(saved); if (parsed.injections) { parsed.injections = parsed.injections.map(inj => { if (inj.name === 'Test E (Daily)' || inj.name === 'Test E (Mon/Thu)') { return { ...inj, name: 'Test E (Mon/Thu)', dose: '150mg x2/week Mon+Thu (300mg/week)' }; } if (inj.name === 'Primobolone (Weekly)' || inj.name === 'Primobolone (Mon/Thu)') { return { ...inj, name: 'Primobolone (Mon/Thu)', dose: '150mg x2/week Mon+Thu (300mg/week)' }; } return inj; }); } setData(parsed); }
      }, []);

      useEffect(() => {
        localStorage.setItem('recompOSProData', JSON.stringify(data));
      }, [data]);

      const toggleItem = (category, index) => {
        setData(prev => ({
          ...prev,
          [category]: prev[category].map((item, i) =>
            i === index ? { ...item, completed: !item.completed } : item
          ),
        }));
      };

      const updateMetric = (metric, value) => {
        setData(prev => ({ ...prev, [metric]: value }));
      };

      const updateProtocolField = (field, value) => {
        setData(prev => ({ ...prev, [field]: value }));
      };

      const updateLab = (index, field, value) => {
        setData(prev => {
          const labs = prev.labs.map((lab, i) => i === index ? { ...lab, [field]: value } : lab);
          return { ...prev, labs };
        });
      };

      const addLab = () => {
        setData(prev => ({
          ...prev,
          labs: [...prev.labs, { name: 'New Lab', value: '', date: new Date().toISOString().split('T')[0], range: '' }]
        }));
      };

      const removeLab = (index) => {
        setData(prev => ({
          ...prev,
          labs: prev.labs.filter((_, i) => i !== index)
        }));
      };

      const addInjection = () => {
        setData(prev => ({
          ...prev,
          injections: [...prev.injections, { name: 'New Injection', dose: '', completed: false }]
        }));
      };

      const updateInjection = (index, field, value) => {
        setData(prev => {
          const injections = prev.injections.map((item, i) => i === index ? { ...item, [field]: value } : item);
          return { ...prev, injections };
        });
      };

      const removeInjection = (index) => {
        setData(prev => ({
          ...prev,
          injections: prev.injections.filter((_, i) => i !== index)
        }));
      };

      const addSupplement = () => {
        setData(prev => ({
          ...prev,
          supplements: [...prev.supplements, { name: 'New Supplement', completed: false }]
        }));
      };

      const updateSupplement = (index, field, value) => {
        setData(prev => {
          const supplements = prev.supplements.map((item, i) => i === index ? { ...item, [field]: value } : item);
          return { ...prev, supplements };
        });
      };

      const removeSupplement = (index) => {
        setData(prev => ({
          ...prev,
          supplements: prev.supplements.filter((_, i) => i !== index)
        }));
      };

      const addMeal = () => {
        setData(prev => ({
          ...prev,
          meals: [...prev.meals, { name: 'New Meal', time: '', food: '', completed: false }]
        }));
      };

      const updateMeal = (index, field, value) => {
        setData(prev => {
          const meals = prev.meals.map((item, i) => i === index ? { ...item, [field]: value } : item);
          return { ...prev, meals };
        });
      };

      const removeMeal = (index) => {
        setData(prev => ({
          ...prev,
          meals: prev.meals.filter((_, i) => i !== index)
        }));
      };

      const exportData = () => {
        const dataStr = JSON.stringify(data, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `recomp-os-pro-${new Date().toISOString().split('T')[0]}.json`;
        a.click();
      };

      return (
        <div className="container">
          <div className="header">
            <div className="logo">
              <div className="logo-icon">⚡</div>
              <div>
                <div className="title">RECOMP OS PRO</div>
                <div style={{ fontSize: '12px', color: '#8b95a5', marginTop: '4px' }}>
                  ISMAEL PHYSIQUE OPERATING SYSTEM
                </div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: '12px', alignItems: 'center' }}>
              <span className="version">v2.0</span>
              <div className="status">
                <div className="status-dot"></div>
                <span>SYSTEM ACTIVE</span>
              </div>
            </div>
          </div>

          <div className="nav-tabs">
            <button className={`tab ${activeTab === 'today' ? 'active' : ''}`} onClick={() => setActiveTab('today')}>📊 Today</button>
            <button className={`tab ${activeTab === 'protocol' ? 'active' : ''}`} onClick={() => setActiveTab('protocol')}>💉 Protocol</button>
            <button className={`tab ${activeTab === 'labs' ? 'active' : ''}`} onClick={() => setActiveTab('labs')}>🔬 Labs</button>
            <button className={`tab ${activeTab === 'calendar' ? 'active' : ''}`} onClick={() => setActiveTab('calendar')}>📅 Calendar</button>
            <button className={`tab ${activeTab === 'photos' ? 'active' : ''}`} onClick={() => setActiveTab('photos')}>📸 Photos</button>
            <button className={`tab ${activeTab === 'nutrition' ? 'active' : ''}`} onClick={() => setActiveTab('nutrition')}>🍽️ Nutrition</button>
            <button className={`tab ${activeTab === 'training' ? 'active' : ''}`} onClick={() => setActiveTab('training')}>🏋️ Training</button>
            <button className={`tab ${activeTab === 'forecast' ? 'active' : ''}`} onClick={() => setActiveTab('forecast')}>📈 Forecast</button>
            <button className={`tab ${activeTab === 'checklist' ? 'active' : ''}`} onClick={() => setActiveTab('checklist')}>✅ Checklist</button>
          </div>

          {activeTab === 'today' && (
            <>
              <div style={{ marginBottom: '20px', display: 'flex', gap: '12px', flexWrap: 'wrap' }}>
                <span className="badge badge-blue">Recomp Day: {data.recompDay}</span>
                <span className="badge badge-yellow">Phase: {data.phase}</span>
                <span className="badge badge-green">Compliance: {data.compliance}%</span>
              </div>

              <div className="grid">
                <div className="card">
                  <div className="card-header">
                    <h3 className="card-title">Weight</h3>
                  </div>
                  <div className="metric-value">{data.weight}</div>
                  <div className="metric-label">lbs</div>
                  <input
                    type="number"
                    value={data.weight}
                    onChange={(e) => updateMetric('weight', e.target.value)}
                    style={{ marginTop: '12px' }}
                  />
                </div>

                <div className="card">
                  <div className="card-header">
                    <h3 className="card-title">Sleep (Hours)</h3>
                  </div>
                  <div className="metric-value">{data.sleep}</div>
                  <div className="metric-label">hours</div>
                  <input
                    type="number"
                    value={data.sleep}
                    onChange={(e) => updateMetric('sleep', e.target.value)}
                    style={{ marginTop: '12px' }}
                  />
                </div>

                <div className="card">
                  <div className="card-header">
                    <h3 className="card-title">Steps</h3>
                  </div>
                  <div className="metric-value">{data.steps.toLocaleString()}</div>
                  <div className="metric-label">target: 15-20k steps</div>
                  <input
                    type="number"
                    value={data.steps}
                    onChange={(e) => updateMetric('steps', e.target.value)}
                    style={{ marginTop: '12px' }}
                  />
                </div>

                <div className="card">
                  <div className="card-header">
                    <h3 className="card-title">Water (Liters)</h3>
                  </div>
                  <div className="metric-value">{data.water}</div>
                  <div className="metric-label">Aim: ~1-1.5 gallons (3.8-5.7L)</div>
                  <input
                    type="number"
                    value={data.water}
                    onChange={(e) => updateMetric('water', e.target.value)}
                    style={{ marginTop: '12px' }}
                  />
                </div>
              </div>

              <div className="grid">
                <div className="card">
                  <div className="card-header">
                    <h3 className="card-title">Injections / Phase</h3>
                  </div>
                  <div className="checkbox-list">
                    {data.injections.map((item, idx) => (
                      <div
                        key={idx}
                        className={`checkbox-item ${item.completed ? 'completed' : ''}`}
                        onClick={() => toggleItem('injections', idx)}
                      >
                        <div className={`checkbox ${item.completed ? 'checked' : ''}`}>
                          {item.completed && '✓'}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: '500' }}>{item.name}</div>
                          <div style={{ fontSize: '12px', color: '#8b95a5' }}>{item.dose}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="card">
                  <div className="card-header">
                    <h3 className="card-title">Meals & Training</h3>
                  </div>
                  <div className="checkbox-list">
                    {data.meals.map((item, idx) => (
                      <div
                        key={idx}
                        className={`checkbox-item ${item.completed ? 'completed' : ''}`}
                        onClick={() => toggleItem('meals', idx)}
                      >
                        <div className={`checkbox ${item.completed ? 'checked' : ''}`}>
                          {item.completed && '✓'}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: '500' }}>{item.name} — {item.time}</div>
                          <div style={{ fontSize: '12px', color: '#8b95a5' }}>{item.food}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="grid">
                <div className="card">
                  <div className="card-header">
                    <h3 className="card-title">Supplements</h3>
                  </div>
                  <div className="checkbox-list">
                    {data.supplements.map((item, idx) => (
                      <div
                        key={idx}
                        className={`checkbox-item ${item.completed ? 'completed' : ''}`}
                        onClick={() => toggleItem('supplements', idx)}
                      >
                        <div className={`checkbox ${item.completed ? 'checked' : ''}`}>
                          {item.completed && '✓'}
                        </div>
                        <div style={{ fontWeight: '500' }}>{item.name}</div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="card">
                  <div className="card-header">
                    <h3 className="card-title">Hair Protocol</h3>
                  </div>
                  <div className="checkbox-list">
                    {data.hairProtocol.map((item, idx) => (
                      <div
                        key={idx}
                        className={`checkbox-item ${item.completed ? 'completed' : ''}`}
                        onClick={() => toggleItem('hairProtocol', idx)}
                      >
                        <div className={`checkbox ${item.completed ? 'checked' : ''}`}>
                          {item.completed && '✓'}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontWeight: '500' }}>{item.name}</div>
                          <div style={{ fontSize: '12px', color: '#8b95a5' }}>{item.dose}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="card">
                  <div className="card-header">
                    <h3 className="card-title">Skin & Recovery</h3>
                  </div>
                  <div className="checkbox-list">
                    {data.skinRoutine.map((item, idx) => (
                      <div
                        key={idx}
                        className={`checkbox-item ${item.completed ? 'completed' : ''}`}
                        onClick={() => toggleItem('skinRoutine', idx)}
                      >
                        <div className={`checkbox ${item.completed ? 'checked' : ''}`}>
                          {item.completed && '✓'}
                        </div>
                        <div style={{ fontWeight: '500' }}>{item.name}</div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <div className="card">
                <div className="card-header">
                  <h3 className="card-title">Notes / Symptoms</h3>
                </div>
                <textarea
                  value={data.notes}
                  onChange={(e) => updateMetric('notes', e.target.value)}
                  placeholder="Log blood pressure, mood, libido, pump quality, joint pain, etc."
                />
              </div>
            </>
          )}

          {activeTab === 'labs' && (
            <div className="card">
              <div className="card-header">
                <h3 className="card-title">🔬 Lab Results</h3>
                <div style={{ display: 'flex', gap: '8px' }}>
                  <button className="btn btn-secondary" onClick={addLab}>+ Add Lab</button>
                  <button className="btn" onClick={() => alert('Connect to Rythmn Health for automatic lab sync')}>Sync Labs</button>
                </div>
              </div>
              <div style={{ marginBottom: '20px' }}>
                {data.labs.map((lab, idx) => (
                  <div key={idx} className="lab-result">
                    <div style={{ flex: 1 }}>
                      <input
                        value={lab.name}
                        onChange={(e) => updateLab(idx, 'name', e.target.value)}
                        style={{ background: 'transparent', color: '#e0e6ed', border: 'none', borderBottom: '1px solid #2a3f5f', width: '100%' }}
                      />
                      <div style={{ fontSize: '11px', color: '#8b95a5', marginTop: '4px' }}>
                        Range:
                        <input
                          value={lab.range}
                          onChange={(e) => updateLab(idx, 'range', e.target.value)}
                          style={{ background: 'transparent', color: '#8b95a5', border: 'none', width: '120px', marginLeft: '4px' }}
                        />
                      </div>
                    </div>
                    <div style={{ textAlign: 'right' }}>
                      <input
                        value={lab.value}
                        onChange={(e) => updateLab(idx, 'value', e.target.value)}
                        style={{ background: 'transparent', color: '#00d4ff', fontWeight: 600, border: 'none', width: '110px', textAlign: 'right' }}
                      />
                      <div style={{ fontSize: '11px', color: '#8b95a5', marginTop: '4px' }}>
                        <input
                          type="date"
                          value={lab.date}
                          onChange={(e) => updateLab(idx, 'date', e.target.value)}
                          style={{ background: 'transparent', color: '#8b95a5', border: 'none', width: '130px' }}
                        />
                      </div>
                    </div>
                    <button className="btn btn-secondary" style={{ marginLeft: '8px' }} onClick={() => removeLab(idx)}>✕</button>
                  </div>
                ))}
              </div>
              <p style={{ color: '#8b95a5', fontSize: '13px', marginTop: '20px' }}>
                💡 Connect to Rythmn Health for automatic lab syncing and tracking
              </p>
            </div>
          )}

          {activeTab === 'calendar' && (
            <div className="card">
              <div className="card-header">
                <h3 className="card-title">📅 Cycle Calendar</h3>
              </div>
              <div style={{ marginBottom: '20px' }}>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: '8px', marginBottom: '12px' }}>
                  {['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].map(day => (
                    <div key={day} style={{ textAlign: 'center', color: '#8b95a5', fontSize: '12px', fontWeight: '600' }}>
                      {day}
                    </div>
                  ))}
                </div>
                <div className="calendar">
                  {Array.from({ length: 35 }, (_, i) => (
                    <div key={i} className={`calendar-day ${i === 15 ? 'active' : ''}`}>
                      {i > 4 && i < 35 ? i - 4 : ''}
                    </div>
                  ))}
                </div>
              </div>
              <p style={{ color: '#8b95a5', fontSize: '13px' }}>
                📍 Track injection days, blood work appointments, and cycle phases
              </p>
            </div>
          )}

          {activeTab === 'photos' && (
            <div className="card">
              <div className="card-header">
                <h3 className="card-title">📸 Progress Photos</h3>
                <button className="btn">Upload Photo</button>
              </div>
              <div className="photo-grid">
                {Array.from({ length: 6 }, (_, i) => (
                  <div key={i} className="photo-placeholder">
                    <span style={{ color: '#8b95a5' }}>+</span>
                  </div>
                ))}
              </div>
              <p style={{ color: '#8b95a5', fontSize: '13px', marginTop: '20px' }}>
                📷 Upload weekly progress photos (front, back, side) to track physical changes
              </p>
            </div>
          )}

          {activeTab === 'protocol' && (
            <div className="card">
              <div className="card-header">
                <h3 className="card-title">💉 Current Protocol</h3>
                <button className="btn btn-secondary" onClick={() => updateProtocolField('protocolEditing', !data.protocolEditing)}>
                  {data.protocolEditing ? 'Done' : 'Edit Protocol'}
                </button>
              </div>
              {data.protocolEditing ? (
                <div style={{ display: 'grid', gap: '12px', marginTop: '12px' }}>
                  <div>
                    <div className="metric-label">Cycle Start Date</div>
                    <input
                      type="date"
                      value={data.cycleStart || '2025-06-08'}
                      onChange={(e) => updateProtocolField('cycleStart', e.target.value)}
                      style={{ marginTop: '8px' }}
                    />
                  </div>
                  <div>
                    <div className="metric-label">Weekly Test Dose (mg)</div>
                    <input
                      type="number"
                      value={data.weeklyTestE || 300}
                      onChange={(e) => updateProtocolField('weeklyTestE', parseFloat(e.target.value) || 0)}
                      style={{ marginTop: '8px' }}
                    />
                  </div>
                  <div>
                    <div className="metric-label">Weekly Primobolone (mg)</div>
                    <input
                      type="number"
                      value={data.weeklyPrimo || 200}
                      onChange={(e) => updateProtocolField('weeklyPrimo', parseFloat(e.target.value) || 0)}
                      style={{ marginTop: '8px' }}
                    />
                  </div>
                  <div>
                    <div className="metric-label">hCG Frequency</div>
                    <select
                      value={data.hcgWeekly || '3x per week (500 IU each)'}
                      onChange={(e) => updateProtocolField('hcgWeekly', e.target.value)}
                      style={{ marginTop: '8px', background: 'rgba(0,0,0,0.3)', color: '#e0e6ed', border: '1px solid #2a3f5f', padding: '10px', borderRadius: '8px' }}
                    >
                      <option value="2x per week (250 IU)">2x per week (250 IU)</option>
                      <option value="3x per week (500 IU)">3x per week (500 IU)</option>
                      <option value="None">None</option>
                    </select>
                  </div>
                  <div>
                    <div className="metric-label">hCG Single Dose (IU)</div>
                    <input
                      type="number"
                      value={data.hcgDose || 500}
                      onChange={(e) => updateProtocolField('hcgDose', parseFloat(e.target.value) || 0)}
                      style={{ marginTop: '8px' }}
                    />
                  </div>
                </div>
              ) : (
                <div style={{ lineHeight: '1.8', marginTop: '12px' }}>
                  <h4 style={{ color: '#00d4ff', marginBottom: '12px', fontSize: '16px' }}>Hormones</h4>
                  <p>• Test E: {(data.dailyTestE || 300 / 7).toFixed(1)}mg daily ({(data.weeklyTestE || 300)}mg/week total)</p>
                  <p>• Primobolone: {(data.weeklyPrimo || 200)}mg weekly</p>
                  <p>• Glow Stack: 20 IU daily</p>
                  <p>• hCG: {data.hcgWeekly || '3x weekly'} ({data.hcgDose || 500} IU)</p>
                  <p>• Arimidex: 0.5mg as needed (E2 management)</p>
                  <h4 style={{ color: '#00d4ff', margin: '20px 0 12px', fontSize: '16px' }}>Hair Protocol</h4>
                  <p>• Dutasteride: 0.85-1mg daily (6-7mg/week)</p>
                  <p>• Minoxidil: 5-6mg oral daily</p>
                  <h4 style={{ color: '#00d4ff', margin: '20px 0 12px', fontSize: '16px' }}>Supplements</h4>
                  <p>• AM: Creatine, Electrolytes</p>
                  <p>• PM: Fish oil, Magnesium</p>
                </div>
              )}
            </div>
          )}

          {activeTab === 'nutrition' && (
            <div className="card">
              <div className="card-header">
                <h3 className="card-title">🍽️ Nutrition Tracker</h3>
              </div>
              <div style={{ display: 'grid', gap: '12px' }}>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: '8px' }}>
                  <div>
                    <div className="metric-label">Meal Name</div>
                    <input value={data.nutritionNewName || ''} onChange={(e) => updateMetric('nutritionNewName', e.target.value)} style={{ marginTop: '8px' }} />
                  </div>
                  <div>
                    <div className="metric-label">Time</div>
                    <input value={data.nutritionNewTime || ''} onChange={(e) => updateMetric('nutritionNewTime', e.target.value)} style={{ marginTop: '8px' }} />
                  </div>
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '8px' }}>
                  <div>
                    <div className="metric-label">Cal</div>
                    <input type="number" value={data.nutritionNewCal || ''} onChange={(e) => updateMetric('nutritionNewCal', e.target.value)} style={{ marginTop: '8px' }} />
                  </div>
                  <div>
                    <div className="metric-label">Protein</div>
                    <input type="number" value={data.nutritionNewProtein || ''} onChange={(e) => updateMetric('nutritionNewProtein', e.target.value)} style={{ marginTop: '8px' }} />
                  </div>
                  <div>
                    <div className="metric-label">Carbs</div>
                    <input type="number" value={data.nutritionNewCarbs || ''} onChange={(e) => updateMetric('nutritionNewCarbs', e.target.value)} style={{ marginTop: '8px' }} />
                  </div>
                  <div>
                    <div className="metric-label">Fat</div>
                    <input type="number" value={data.nutritionNewFat || ''} onChange={(e) => updateMetric('nutritionNewFat', e.target.value)} style={{ marginTop: '8px' }} />
                  </div>
                </div>
                <button className="btn" onClick={() => {
                  const meals = [...(data.meals || []), {
                    name: data.nutritionNewName || 'Meal',
                    time: data.nutritionNewTime || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    food: `${data.nutritionNewCal || 0} cal / P:${data.nutritionNewProtein || 0} / C:${data.nutritionNewCarbs || 0} / F:${data.nutritionNewFat || 0}`,
                    completed: false,
                  }];
                  updateMetric('meals', meals);
                  updateMetric('nutritionNewName', '');
                  updateMetric('nutritionNewTime', '');
                  updateMetric('nutritionNewCal', '');
                  updateMetric('nutritionNewProtein', '');
                  updateMetric('nutritionNewCarbs', '');
                  updateMetric('nutritionNewFat', '');
                }}>Add Meal</button>

                <div className="checkbox-list">
                  {(data.meals || []).slice(0, 20).map((item, idx) => (
                    <div key={idx} className={`checkbox-item ${item.completed ? 'completed' : ''}`} onClick={() => toggleItem('meals', idx)}>
                      <div className={`checkbox ${item.completed ? 'checked' : ''}`}>{item.completed && '✓'}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: '500' }}>{item.name} — {item.time}</div>
                        <div style={{ fontSize: '12px', color: '#8b95a5' }}>{item.food}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {activeTab === 'training' && (
            <div className="card">
              <div className="card-header">
                <h3 className="card-title">🏋️ Training Log</h3>
              </div>
              <div style={{ display: 'grid', gap: '12px' }}>
                <div>
                  <div className="metric-label">Exercise Name</div>
                  <input value={data.trainingNewName || ''} onChange={(e) => updateMetric('trainingNewName', e.target.value)} style={{ marginTop: '8px' }} />
                </div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: '8px' }}>
                  <div>
                    <div className="metric-label">Sets</div>
                    <input type="number" value={data.trainingNewSets || 3} onChange={(e) => updateMetric('trainingNewSets', parseInt(e.target.value || '0', 10))} style={{ marginTop: '8px' }} />
                  </div>
                  <div>
                    <div className="metric-label">Reps</div>
                    <input type="number" value={data.trainingNewReps || 10} onChange={(e) => updateMetric('trainingNewReps', parseInt(e.target.value || '0', 10))} style={{ marginTop: '8px' }} />
                  </div>
                  <div>
                    <div className="metric-label">Weight</div>
                    <input type="number" value={data.trainingNewWeight || ''} onChange={(e) => updateMetric('trainingNewWeight', parseFloat(e.target.value || '0'))} style={{ marginTop: '8px' }} />
                  </div>
                  <div>
                    <div className="metric-label">Unit</div>
                    <select value={data.trainingNewUnit || 'lbs'} onChange={(e) => updateMetric('trainingNewUnit', e.target.value)} style={{ marginTop: '8px', background: 'rgba(0,0,0,0.3)', color: '#e0e6ed', border: '1px solid #2a3f5f', padding: '10px', borderRadius: '8px' }}>
                      <option value="lbs">lbs</option>
                      <option value="kg">kg</option>
                    </select>
                  </div>
                  <div>
                    <div className="metric-label">RPE</div>
                    <input type="number" value={data.trainingNewRpe || ''} onChange={(e) => updateMetric('trainingNewRpe', parseFloat(e.target.value || '0'))} style={{ marginTop: '8px' }} />
                  </div>
                </div>
                <button className="btn" onClick={() => {
                  const meals = [...(data.meals || []), {
                    name: data.trainingNewName || 'Workout',
                    time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                    food: `${data.trainingNewSets || 0} sets x ${data.trainingNewReps || 0} @ ${data.trainingNewWeight || 0} ${data.trainingNewUnit || 'lbs'}`,
                    completed: false,
                  }];
                  updateMetric('meals', meals);
                  updateMetric('trainingNewName', '');
                  updateMetric('trainingNewWeight', '');
                  updateMetric('trainingNewRpe', '');
                }}>Log Exercise</button>

                <div className="checkbox-list">
                  {(data.meals || []).slice(0, 20).map((item, idx) => (
                    <div key={idx} className={`checkbox-item ${item.completed ? 'completed' : ''}`} onClick={() => toggleItem('meals', idx)}>
                      <div className={`checkbox ${item.completed ? 'checked' : ''}`}>{item.completed && '✓'}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontWeight: '500' }}>{item.name} — {item.time}</div>
                        <div style={{ fontSize: '12px', color: '#8b95a5' }}>{item.food}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {activeTab === 'forecast' && (
            <div className="card">
              <div className="card-header">
                <h3 className="card-title">📈 Forecast</h3>
              </div>
              <p style={{ color: '#8b95a5' }}>Forecast uses your logged data. Keep logging weight, meals, and training to generate trends.</p>
              <div className="grid" style={{ marginTop: '16px' }}>
                <div className="card">
                  <div className="card-header"><h3 className="card-title">Weight</h3></div>
                  <div className="metric-value">{data.weight}</div>
                  <div className="metric-label">lbs</div>
                </div>
                <div className="card">
                  <div className="card-header"><h3 className="card-title">Steps</h3></div>
                  <div className="metric-value">{Number.isFinite(data.steps) ? data.steps.toLocaleString() : '0'}</div>
                  <div className="metric-label">target: 15-20k steps</div>
                </div>
              </div>
            </div>
          )}

          {activeTab === 'checklist' && (
            <div className="card">
              <div className="card-header">
                <h3 className="card-title">✅ Daily Checklist</h3>
              </div>
              <div style={{ display: 'flex', gap: '8px', flexWrap: 'wrap', marginBottom: '8px' }}>
                <input placeholder="New item" value={data.newChecklistItem || ''} onChange={(e) => updateMetric('newChecklistItem', e.target.value)} />
                <button className="btn" onClick={() => {
                  const value = (data.newChecklistItem || '').trim();
                  if (!value) return;
                  const items = [...(data.supplements || []), { name: value, completed: false }];
                  updateMetric('supplements', items);
                  updateMetric('newChecklistItem', '');
                }}>+ Add</button>
              </div>
              <div className="checkbox-list">
                {(data.supplements || []).map((item, idx) => (
                  <div key={idx} className={`checkbox-item ${item.completed ? 'completed' : ''}`} onClick={() => toggleItem('supplements', idx)}>
                    <div className={`checkbox ${item.completed ? 'checked' : ''}`}>{item.completed && '✓'}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontWeight: '500' }}>{item.name}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div style={{ marginTop: '24px', display: 'flex', gap: '12px', justifyContent: 'center' }}>
            <button className="btn" onClick={exportData}>📥 Export Data</button>
            <button className="btn btn-secondary" onClick={() => window.syncToCloud()}>☁️ Cloud Sync</button>
          </div>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));

      </script>

  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>

  <script src="nutrition.js"></script>
  <script src="training.js"></script>
  <script src="checklist.js"></script>
  <script src="pro-features.js"></script>
  <script src="auth-ui.js"></script>

  <script>
    window.__initRecompProModules = function () {
      var forecastContainer = document.querySelector('[data-recomp-tab="forecast"] .card');
      var checklistContainer = document.querySelector('[data-recomp-tab="checklist"] .card');
      var nutritionContainer = document.querySelector('[data-recomp-tab="nutrition"] .card');
      var trainingContainer = document.querySelector('[data-recomp-tab="training"] .card');
      var photosContainer = document.querySelector('[data-recomp-tab="photos"] .card');
      var calendarContainer = document.querySelector('[data-recomp-tab="calendar"] .card');

      if (nutritionContainer) renderNutritionUI(nutritionContainer);
      if (trainingContainer) renderTrainingUI(trainingContainer);
      if (forecastContainer) renderAnalyticsUI(forecastContainer);
      if (checklistContainer) renderChecklistUI(checklistContainer);
      if (typeof renderCalendarUI === 'function' && calendarContainer) renderCalendarUI(calendarContainer);
      if (typeof renderPhotosUI === 'function' && photosContainer) renderPhotosUI(photosContainer);

      console.log('Pro modules initialized');
    };

    document.addEventListener('DOMContentLoaded', function () {
      try { window.__initRecompProModules && window.__initRecompProModules(); } catch (e) { console.warn('Pro module init skipped', e); }
    });
  </script>
</body>
</html>
